name: Build Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 📦 Install QuickShop
      - name: Install QuickShop jar
        run: |
          mvn install:install-file \
          -Dfile=libs/QuickShop-Hikari.jar \
          -DgroupId=com.quickshop \
          -DartifactId=quickshop \
          -Dversion=1.0 \
          -Dpackaging=jar

      # 📦 Install Skript
      - name: Install Skript jar
        run: |
          mvn install:install-file \
          -Dfile=libs/Skript.jar \
          -DgroupId=com.skript \
          -DartifactId=skript \
          -Dversion=1.0 \
          -Dpackaging=jar

      # 🔨 Build
      - name: Build with Maven
        run: mvn clean package

      # 📦 Upload artifact
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar