name: Build Plugin

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clone repo
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 🔐 Auth GitHub Packages
      - name: Setup Maven auth
        uses: s4u/maven-settings-action@v2
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]

      # 💣 FIX CRITIQUE → supprime Vault corrompu
      - name: Fix Vault cache
        run: rm -rf ~/.m2/repository/com/github/MilkBowl

      # 🔄 Force re-download dépendances
      - name: Build with Maven
        run: mvn clean package -U

      # 📤 Upload .jar
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridge
          path: target/*.jar