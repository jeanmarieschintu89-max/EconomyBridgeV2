name: Build EconomyBridgeV2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # 👈 bouton "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Clone repo
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java 21 (OBLIGATOIRE)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ⚡ Cache Maven (plus rapide)
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # 🔨 Build plugin
      - name: Build with Maven
        run: mvn clean package

      # 📤 Upload du .jar (BOUTON DOWNLOAD)
      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar