name: Build EconomyBridgeV2

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Clone du repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ☕ Setup Java 17
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📦 Cache Maven (accélère)
      - name: ⚡ Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # 🔨 Build plugin
      - name: 🔨 Build with Maven
        run: mvn clean package

      # 📤 Upload du .jar
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar