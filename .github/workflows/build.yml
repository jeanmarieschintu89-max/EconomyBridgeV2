name: Build EconomyBridgeV2

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Clone repo
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ⚡ Cache Maven
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # 🔥 Installer QuickShop local
      - name: Install QuickShop locally
        run: |
          mvn install:install-file \
            -Dfile=libs/QuickShop.jar \
            -DgroupId=com.quickshop \
            -DartifactId=quickshop \
            -Dversion=6.2.0.11 \
            -Dpackaging=jar

      # 🔨 Build
      - name: Build with Maven
        run: mvn clean package

      # 📤 Upload du jar
      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar