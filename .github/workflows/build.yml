name: Build Plugin

on:
  workflow_dispatch:
  push:
    branches: ["main"]

# 🔥 FIX 403 (OBLIGATOIRE)
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clone repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 🔐 Auth Maven GitHub Packages
      - name: Setup Maven auth
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # 🧪 DEBUG (à laisser au début si besoin)
      - name: Debug files
        run: ls -R

      # 📦 Upload QuickShop vers GitHub Packages
      - name: Deploy QuickShop
        run: |
          mvn deploy:deploy-file \
          -Dfile=libs/QuickShop-Hikari.jar \
          -DgroupId=com.quickshop \
          -DartifactId=quickshop \
          -Dversion=1.0 \
          -Dpackaging=jar \
          -DrepositoryId=github \
          -Durl=https://maven.pkg.github.com/${{ github.repository }}

      # 📦 Upload Skript vers GitHub Packages
      - name: Deploy Skript
        run: |
          mvn deploy:deploy-file \
          -Dfile=libs/Skript.jar \
          -DgroupId=com.skript \
          -DartifactId=skript \
          -Dversion=1.0 \
          -Dpackaging=jar \
          -DrepositoryId=github \
          -Durl=https://maven.pkg.github.com/${{ github.repository }}

      # 🔨 Build plugin
      - name: Build with Maven
        run: mvn clean package

      # 📦 Upload artifact
      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar