name: Build Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔥 On installe ton QuickShop.jar dans Maven
      - name: Install QuickShop locally
        run: |
          mvn install:install-file \
            -Dfile=libs/QuickShop.jar \
            -DgroupId=com.ghostchu \
            -DartifactId=quickshop \
            -Dversion=1.0 \
            -Dpackaging=jar

      # 🔨 Build du plugin
      - name: Build with Maven
        run: mvn clean package

      # 📦 Upload du jar compilé
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EconomyBridgeV2
          path: target/*.jar