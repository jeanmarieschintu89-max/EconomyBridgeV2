 name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify files
        run: |
          echo "=== ROOT ==="
          ls
          echo "=== LIBS ==="
          ls libs

      - name: Install QuickShop locally
        run: |
          mvn install:install-file \
            -Dfile=./libs/QuickShop.jar \
            -DgroupId=com.ghostchu \
            -DartifactId=quickshop \
            -Dversion=1.0 \
            -Dpackaging=jar

      - name: Build
        run: mvn clean package