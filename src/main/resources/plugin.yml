name: EconomyBridge
main: fr.moodcraft.bridge.Main
version: 1.0
api-version: 1.20

depend: [Vault]
softdepend: [Jobs] # 🔥 IMPORTANT (évite crash si Jobs absent)

commands:

  # =========================
  # 📊 CONTRATS
  # =========================

  topgui:
    description: Classement GUI
    permission: econ.use

  toprep:
    description: Voir le classement réputation
    usage: /toprep
    permission: econ.use

  rep:
    permission: econ.admin

  resetrep:
    permission: econ.admin

  contractlog:
    description: Voir historique contrats
    usage: /contractlog [joueur]
    permission: econ.admin

  delcontrat:
    description: Supprimer un contrat
    usage: /delcontrat <id>
    permission: econ.admin

  contrats:
    description: Ouvrir le menu des contrats
    usage: /contrats
    permission: econ.use

  contrataccept:
    description: Accepter un contrat
    usage: /contrataccept <id>
    permission: econ.use

  contractdeliver:
    description: Livrer un contrat
    usage: /contractdeliver <id>
    permission: econ.use

  # =========================
  # ⭐ RÉPUTATION
  # =========================

  resetrep:
    description: Reset réputation joueur
    usage: /resetrep <joueur>
    permission: econ.admin

  # =========================
  # 💰 MARCHÉ
  # =========================

  prix:
    description: Ouvre le marché
    usage: /prix
    permission: econ.use

  syncprix:
    description: Synchronise tous les shops
    usage: /syncprix
    permission: econ.admin

  trend:
    description: Voir tendance d'un item
    usage: /trend <item>
    permission: econ.use

  # =========================
  # 🏦 BANQUE
  # =========================

  transactions:
    description: Voir les transactions bancaires
    usage: /transactions [joueur]
    permission: econ.use

  iban:
    description: Voir son IBAN
    usage: /iban [joueur]
    permission: econ.use

  ibanpay:
    description: Envoyer de l'argent via IBAN
    usage: /ibanpay <iban> <montant>
    permission: econ.use

  bank:
    description: Modifier la banque d'un joueur
    usage: /bank <joueur> <montant>
    permission: econ.admin

  # =========================
  # ⚙️ ADMIN ECO
  # =========================

  ecoreset:
    description: Reset complet de l'économie
    usage: /ecoreset
    permission: econ.admin

  ecotest:
    description: Test économie
    usage: /ecotest
    permission: econ.admin

  ecoreload:
    description: Recharge la config économie
    usage: /ecoreload
    permission: econ.admin

  # =========================
  # 🧭 MENU
  # =========================

  menu:
    description: Ouvre le menu principal
    usage: /menu
    permission: econ.use

permissions:

  econ.admin:
    description: Accès total à l'économie
    default: op

  econ.use:
    description: Accès aux fonctionnalités joueur
    default: true