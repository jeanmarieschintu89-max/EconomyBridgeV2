name: EconomyBridge
main: fr.moodcraft.bridge.Main
version: 1.0
api-version: 1.20

depend: [Vault]

commands:
  prix:
    description: Ouvre le marché
    usage: /prix

  syncprix:
    description: Sync tous les shops
    permission: op

  trend:
    description: Voir tendance
    usage: /trend <item>

  ecoreset:
    description: Reset complet de l'économie
    permission: op

  banqueadmin:
    description: Banque admin
    permission: op

  ecotest:
    description: Test economie
    permission: op