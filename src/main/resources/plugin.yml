name: EconomyBridge
main: fr.moodcraft.bridge.Main
version: 1.0
api-version: 1.20

depend: [Vault]

commands:

  contractlog:
    description: Voir historique contrats
    usage: /contractlog [joueur]

  delcontrat:
    description: Supprimer un contrat
    usage: /delcontrat <id>

  resetrep:
    description: Reset réputation joueur
    usage: /resetrep <joueur>

  contrats:
    description: Voir les contrats
    usage: /contrats

  contrataccept:
    description: Accepter un contrat
    usage: /contrataccept <id>

  prix:
    description: Ouvre le marché
    usage: /prix

  syncprix:
    description: Synchronise tous les shops
    usage: /syncprix

  trend:
    description: Voir tendance d'un item
    usage: /trend <item>

  ecoreset:
    description: Reset complet de l'économie
    usage: /ecoreset

  banqueadmin:
    description: Ouvre la banque admin
    usage: /banqueadmin

  ecotest:
    description: Test économie
    usage: /ecotest

  ecoreload:
    description: Recharge la config économie
    usage: /ecoreload

  menu:
    description: Ouvre le menu principal
    usage: /menu

  transactions:
    description: Voir les transactions bancaires
    usage: /transactions [joueur]

  iban:
    description: Voir son IBAN
    usage: /iban [joueur]

  ibanpay:
    description: Envoyer de l'argent via IBAN
    usage: /ibanpay <iban> <montant>

permissions:
  econ.admin:
    description: Accès total à l'économie
    default: op

  econ.use:
    description: Accès aux fonctionnalités joueur
    default: true